# Railway service config for the CRWLA API.
# Set the service's Root Directory to `apps/api` in Railway settings so
# Nixpacks scopes the build to this package (the monorepo root has no
# top-level lockfile that pulls api deps).

[build]
builder = "RAILPACK"
# Generate the Prisma client before nest build so the compiled output can
# import @prisma/client. `npm ci` uses the committed lockfile for repeatable
# installs.
buildCommand = "npm ci && npx prisma generate && npm run build"

[deploy]
# `prisma migrate deploy` is idempotent and cheap on a no-op deploy, so
# running it on every start keeps the schema and the binary in sync without
# a separate Railway pre-deploy step. Falls through to `node dist/main.js`
# only if migrations succeed.
startCommand = "npx prisma migrate deploy && node dist/main.js"

# Nest registers the health controller under the global API_BASE_PATH
# prefix (default /api). Adjust if you change API_BASE_PATH.
healthcheckPath = "/api/health"
healthcheckTimeout = 100

# Restart on crash — Polar/Anthropic transient errors should not take the
# service down permanently.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

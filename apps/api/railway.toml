# Railway service config for the CRWLA API.
# Set the service's Root Directory to `apps/api` so this file (and the
# Dockerfile next to it) get picked up by the build.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# main.ts registers the health controller under API_BASE_PATH (default /api).
healthcheckPath = "/api/health"
healthcheckTimeout = 100

# Restart on crash — transient Polar/Anthropic errors should not take the
# service down permanently.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
